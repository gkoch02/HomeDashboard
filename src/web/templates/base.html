<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <span class="brand">Dashboard</span>
    <a href="/" class="{{ 'active' if request.path == '/' }}">Status</a>
    <a href="/config" class="{{ 'active' if request.path == '/config' }}">Config</a>
    <span class="spacer"></span>
    <span class="meta">
      <span class="refresh-dot" id="refresh-dot"></span>
      <span id="last-run">—</span>
      &nbsp;·&nbsp;
      theme: <strong id="current-theme">—</strong>
    </span>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
