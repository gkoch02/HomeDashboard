name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --tb=short

  test-core-install:
    # Asserts that `pip install .` alone (core deps only, no [dev]/[web] extras)
    # is sufficient to run the non-web test suite. Guards against runtime imports
    # of packages that are only declared under optional-dependencies.
    #
    # Web test files are skipped explicitly (they legitimately require
    # flask/waitress from the [web] extra). Test tooling (pytest) is the only
    # thing installed alongside core deps — no flask/waitress — so any
    # accidental import of an optional-extra package from core code will fail.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      # pytest-cov is required because pyproject.toml's addopts passes --cov;
      # it's test tooling, not an application dep, so it doesn't undermine the
      # "no optional-extra app packages" guarantee.
      - run: pip install . pytest pytest-cov
      - run: python -m pytest tests/ --ignore-glob='tests/test_web_*.py' --tb=short --no-cov

  snapshot-tests:
    # Runs the pixel-hash snapshot assertions against the exact Pillow version
    # recorded in tests/snapshots/theme_pixel_hashes.json. The normal test
    # matrix skips these assertions when Pillow differs from the baseline, so
    # this is the one job where a snapshot regression actually fails CI.
    #
    # To intentionally update baselines: bump Pillow locally, run
    # UPDATE_SNAPSHOTS=1 pytest tests/test_theme_pixel_snapshots.py, and
    # commit both the new JSON (which records the new Pillow version) and
    # any source changes. This job will pick up the new version automatically.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Pin Pillow to the baseline's reference version
        run: |
          PV=$(python -c "import json; print(json.load(open('tests/snapshots/theme_pixel_hashes.json'))['reference_env']['pillow_version'])")
          echo "Installing Pillow==${PV}"
          pip install "Pillow==${PV}"
      - run: python -m pytest tests/test_theme_pixel_snapshots.py --tb=short --no-cov

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: python -m mypy src/

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Seed config from example
        run: cp config/config.example.yaml config/config.yaml
      - name: Validate example config
        run: python -m src.main --check-config
      - name: Render dummy dashboard
        run: python -m src.main --dry-run --dummy
