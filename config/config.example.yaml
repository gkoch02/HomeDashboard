display:
  # Display backend/provider.
  # "waveshare" = Waveshare e-Paper HATs using the waveshare_epd Python package.
  # "inky"      = Pimoroni Inky Impression panels using the inky Python package.
  provider: "waveshare"
  # Display model — sets native resolution automatically.
  # Waveshare models: epd7in5 (640x384), epd7in5_V2 (800x480), epd7in5_V3 (800x480),
  #   epd7in5b_V2 (800x480), epd7in5_HD (880x528), epd9in7 (1200x825), epd13in3k (1600x1200)
  # Inky models: impression_7_3_2025 (800x480)
  model: "epd7in5_V2"
  # width/height are derived automatically from `model`. Override here only if needed.
  # width: 800
  # height: 480
  enable_partial_refresh: true
  max_partials_before_full: 20
  week_days: 7
  show_weather: true
  show_birthdays: true
  show_info_panel: true
  # Partial refresh is only supported by some Waveshare models. Inky Impression
  # panels always do full refreshes, so leave this false when provider: inky.
  # Final quantization algorithm used when converting greyscale → 1-bit for display.
  # "threshold"       – simple 128-level split; preserves strict black/white rendering
  #                     (default; matches existing behaviour for all built-in themes)
  # "floyd_steinberg" – error-diffusion dithering; better apparent grey for scaled output
  #                     Note: current resize behaviour already uses floyd_steinberg via PIL
  #                     default; set this to preserve that if you rely on non-default displays
  # "ordered"         – 4×4 Bayer ordered dithering; structured dot-matrix pattern
  # quantization_mode: "threshold"

google:
  service_account_path: "credentials/service_account.json"
  calendar_id: "your-calendar-id@group.calendar.google.com"
  additional_calendars: []
  # Required when birthdays.source is "contacts".
  # The service account must have domain-wide delegation enabled in Google
  # Workspace Admin with the People API scope granted, and this field must
  # be set to the email of the user whose contacts should be read.
  # contacts_email: "you@yourdomain.com"

  # --- ICS feed (simpler alternative — no GCP project or credentials required) ---
  # When ical_url is set, calendar events are fetched from this URL instead of
  # the Google Calendar API.  service_account_path is ignored for event fetching.
  #
  # How to get the URL:
  #   Google Calendar → Settings → [pick a calendar] → "Secret address in iCal format"
  #   Keep this URL private — anyone with it can read your calendar.
  #
  # ical_url: "https://calendar.google.com/calendar/ical/.../.../basic.ics"
  # additional_ical_urls: []   # optional extra calendars

weather:
  api_key: "YOUR_OPENWEATHERMAP_API_KEY"
  # CHANGE THESE to your location (these are New York City defaults)
  latitude: 40.7128
  longitude: -74.0060
  units: "imperial"  # "imperial" or "metric"

# PurpleAir air quality (optional).
# When configured, an AQI metric card appears in the weather theme.
purpleair:
  # Get a free API key at develop.purpleair.com
  api_key: "YOUR_PURPLEAIR_API_KEY"
  # Find your sensor index at map.purpleair.com — click your sensor and note
  # the number in the URL (e.g. ?select=12345 → sensor_id: 12345)
  sensor_id: 12345

birthdays:
  source: "file"  # "file", "calendar", or "contacts"
  file_path: "config/birthdays.json"   # used when source is "file"
  calendar_keyword: "Birthday"          # used when source is "calendar"
  lookahead_days: 30

schedule:
  # Hour (0-23) when the display goes quiet — no refreshes until quiet_hours_end.
  quiet_hours_start: 23
  # Hour (0-23) when the display wakes up. The first run triggers a full refresh.
  quiet_hours_end: 6

# IANA timezone name for the display location.
# Use "local" to follow the system clock, or set explicitly (e.g. "America/Los_Angeles").
timezone: "local"

output:
  dry_run_dir: "output"

logging:
  level: "INFO"

# Cache TTL — controls how long cached data is considered usable after a fetch failure.
# Data older than 4x the TTL is discarded entirely (EXPIRED).
# cache:  # uncomment this line to enable section
#   weather_ttl_minutes: 60       # 1 hour
#   events_ttl_minutes: 120       # 2 hours
#   birthdays_ttl_minutes: 1440   # 24 hours
#   # Fetch intervals — skip API calls when cached data is younger than this
#   weather_fetch_interval: 30    # 30 minutes
#   events_fetch_interval: 120    # 2 hours
#   birthdays_fetch_interval: 1440  # 24 hours
#   air_quality_ttl_minutes: 30        # 30 minutes
#   air_quality_fetch_interval: 15     # 15 minutes
#   # How often the displayed quote rotates. Uses a date-based hash so the same
#   # slot always shows the same quote (stable within the bucket, varies between).
#   # With 144 bundled quotes: daily ≈ 144-day cycle, twice_daily ≈ 72-day cycle,
#   # hourly ≈ 6-day cycle. Hash-based (not sequential), so repeats can occur.
#   quote_refresh: daily               # daily (default) | twice_daily | hourly

# Event filtering — hide events from the display without removing them from cache.
# filters:  # uncomment this line to enable section
#   exclude_calendars: ["Holidays", "Spam Calendar"]
#   exclude_keywords: ["OOO", "Block", "Focus Time"]
#   exclude_all_day: false

# Dashboard title displayed in the header bar.
# title: "Home Dashboard"

# Photo theme — set theme: photo and provide a path to a JPEG or PNG file.
# The image is converted to grayscale, resized to fit the canvas, and dithered
# to 1-bit using Floyd-Steinberg diffusion.  A header bar at the bottom of the
# display shows the dashboard title and timestamp.
# photo:  # uncomment this line to enable section
#   path: /home/pi/wallpaper.jpg

# UI theme — controls overall layout, proportions, and visual style.
# Options: default | agenda | terminal | minimalist | old_fashioned | today |
#          fantasy | moonphase | moonphase_invert | qotd | qotd_invert |
#          weather | air_quality | fuzzyclock | fuzzyclock_invert | diags |
#          photo | timeline | year_pulse | monthly | sunrise | scorecard |
#          tides | countdown | astronomy | random_daily | random_hourly
# "random_daily"  — rotate once per day (first refresh after midnight).
# "random_hourly" — rotate once per hour (first refresh after the hour turns).
# "random" is an alias for "random_daily".
# Both random modes respect the include/exclude lists in random_theme below.
# theme: default

# Random theme rotation — only relevant when theme is "random_daily" or "random_hourly".
# Daily state persists in output/random_theme_state.json.
# Hourly state persists in output/random_theme_hourly_state.json.
# random_theme:  # uncomment this line to enable section
#   include: []  # Allowlist: only rotate among these themes (empty = all themes)
#   exclude: []  # Denylist: never use these themes
#                # Example: exclude: ["fantasy", "qotd"]

# Countdown theme — user-defined days-until tracker (set theme: countdown).
# Shows up to 5 upcoming events; one event renders as a hero with a giant numeral,
# multiple events stack as rows.  Past events are dropped automatically.
# countdown:  # uncomment this line to enable section
#   events:
#     - name: "Paris Trip"
#       date: "2026-06-04"
#     - name: "Anniversary"
#       date: "2026-08-12"
#     - name: "Product Launch"
#       date: "2026-05-15"

# Context-aware auto-theming — first matching rule wins.  Rules fire before
# `theme_schedule` and `theme`, but after `--theme` CLI override.  Conditions:
#   weather: OWM current description substring (scalar or list) — "rain", "snow",
#            "clear", "clouds", "thunderstorm", "fog", ...
#   weather_alert_present: true/false — match when any weather alert is active
#   daypart: "dawn", "morning", "afternoon", "dusk", "night" (scalar or list).
#            "day" is a convenience alias for morning ∪ afternoon.
#            With weather data:  dawn = sunrise ±90min, dusk = sunset ±60min,
#            morning = after dawn before local noon, afternoon = after noon
#            before dusk, night = otherwise.  Without weather data, fixed clock
#            ranges are used.
#   season:  "spring", "summer", "fall", "winter" (scalar or list)
#   weekday: "weekend", "weekday", or a day name (scalar or list)
#   calendar: state of today's events (scalar or list).  Values:
#            "empty"          — zero events scheduled today
#            "done"           — all of today's events have already ended
#            "active"         — currently inside an event
#            "upcoming_soon"  — next event starts within the next 30 minutes
#            "busy"           — 5+ events scheduled today
#            "birthday_today" — at least one birthday falls on today
# Rules requiring weather or calendar data silently skip on first boot.
# theme_rules:  # uncomment this line to enable section
#   - when: { weather_alert_present: true }
#     theme: "message"
#   - when: { calendar: "birthday_today" }
#     theme: "today"
#   - when: { calendar: "upcoming_soon" }
#     theme: "today"
#   - when: { calendar: ["empty", "done"] }
#     theme: "qotd"
#   - when: { weather: ["rain", "snow", "thunderstorm"] }
#     theme: "weather"
#   - when: { daypart: "night", weather: "clear" }
#     theme: "moonphase"
#   - when: { weekday: "weekend" }
#     theme: "today"

# Time-of-day theme schedule — automatically switches themes at configured times.
# Checked before random/explicit theme logic. Ignored when --theme is passed via CLI.
# Each entry maps a start time (HH:MM, 24-hour) to a concrete theme name.
# The active theme is the last entry whose time is <= the current local time.
# When no entry applies (all start after the current time), normal theme/random logic runs.
# theme_schedule:  # uncomment this line to enable section
#   - time: "06:00"
#     theme: "default"
#   - time: "20:00"
#     theme: "minimalist"
#   - time: "22:00"
#     theme: "fuzzyclock_invert"
